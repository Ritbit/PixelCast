{% extends 'base.html' %}
{% block title %}Login — PixelCast{% endblock %}

{% block content %}
<div style="max-width:360px; margin:80px auto;">
  <div style="text-align:center; margin-bottom:32px;">
    <img src="{{ url_for('static', filename='brand/pixelcast-logo-adaptive.svg') }}" 
         alt="PixelCast" 
         style="height:80px; width:auto; margin-bottom:16px;">
    <p class="text-muted" style="margin-top:4px; font-size:13px;">Sign in to manage your display</p>
  </div>

  <div class="card">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
        Sign In
      </button>
    </form>
  </div>
  <p class="text-muted" style="text-align:center; margin-top:12px; font-size:12px;">
    First time? Create an admin account to get started.
  </p>
</div>
{% endblock %}
