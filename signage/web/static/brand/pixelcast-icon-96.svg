<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <title>PixelCast Icon 96x96</title>
  <rect width="96" height="96" rx="18" fill="#185FA5"/>
  <!-- 5x5 grid, dot radius 4, spacing 13, start x=9, y=9 -->
  <circle cx="9"  cy="9"  r="4" fill="#60A8E8"/>
  <circle cx="22" cy="9"  r="4" fill="#60A8E8"/>
  <circle cx="35" cy="9"  r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="48" cy="9"  r="4" fill="#60A8E8"/>
  <circle cx="61" cy="9"  r="4" fill="#60A8E8"/>

  <circle cx="9"  cy="22" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="22" cy="22" r="4" fill="#60A8E8"/>
  <circle cx="35" cy="22" r="4" fill="#60A8E8"/>
  <circle cx="48" cy="22" r="4" fill="#60A8E8"/>
  <circle cx="61" cy="22" r="4" fill="#1E6FAF" opacity="0.45"/>

  <circle cx="9"  cy="35" r="4" fill="#60A8E8"/>
  <circle cx="22" cy="35" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="35" cy="35" r="4" fill="#60A8E8"/>
  <circle cx="48" cy="35" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="61" cy="35" r="4" fill="#60A8E8"/>

  <circle cx="9"  cy="48" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="22" cy="48" r="4" fill="#60A8E8"/>
  <circle cx="35" cy="48" r="4" fill="#60A8E8"/>
  <circle cx="48" cy="48" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="61" cy="48" r="4" fill="#60A8E8"/>

  <circle cx="9"  cy="61" r="4" fill="#60A8E8"/>
  <circle cx="22" cy="61" r="4" fill="#60A8E8"/>
  <circle cx="35" cy="61" r="4" fill="#1E6FAF" opacity="0.45"/>
  <circle cx="48" cy="61" r="4" fill="#60A8E8"/>
  <circle cx="61" cy="61" r="4" fill="#60A8E8"/>

  <!-- Signal arcs -->
  <path d="M 67,35 Q 75,26 75,35 Q 75,44 67,35" fill="none" stroke="#60A8E8" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M 67,35 Q 80,20 80,35 Q 80,50 67,35" fill="none" stroke="#60A8E8" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <path d="M 67,35 Q 88,11 88,35 Q 88,59 67,35" fill="none" stroke="#60A8E8" stroke-width="1.5" stroke-linecap="round" opacity="0.38"/>
</svg>
