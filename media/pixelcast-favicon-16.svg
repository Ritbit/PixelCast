<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <title>PixelCast Favicon 16x16</title>
  <rect width="16" height="16" rx="2" fill="#185FA5"/>
  <!-- At 16px, ultra minimal: 2x2 bright dots + 1 arc -->
  <circle cx="3"  cy="3"  r="2" fill="#60A8E8"/>
  <circle cx="8"  cy="3"  r="2" fill="#60A8E8"/>
  <circle cx="3"  cy="8"  r="2" fill="#60A8E8"/>
  <circle cx="8"  cy="8"  r="2" fill="#1E6FAF" opacity="0.5"/>
  <!-- arc hint -->
  <path d="M 11,6 Q 14,3 14,6 Q 14,9 11,6" fill="none" stroke="#60A8E8" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
</svg>
