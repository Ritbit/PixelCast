# /etc/nginx/sites-available/led-signage
# Nginx reverse proxy for LED Signage web UI
#
# Install:
#   sudo apt-get install -y nginx
#   sudo cp pixelcast.conf /etc/nginx/sites-available/led-signage
#   sudo ln -sf /etc/nginx/sites-available/led-signage /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 512M;

    # Proxy all requests to Flask
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Large uploads (video files)
        proxy_request_buffering off;
    }

    # Note: Static files are served through Flask for simplicity
    # If you need nginx to serve static files directly for performance,
    # copy /root/led-signage/signage/web/static to /var/www/pixelcast/static
    # and uncomment the following:
    #
    # location /static/ {
    #     alias /var/www/pixelcast/static/;
    #     expires 1d;
    #     add_header Cache-Control "public";
    # }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
