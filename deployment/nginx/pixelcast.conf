# /etc/nginx/sites-available/led-signage
# Nginx reverse proxy for LED Signage web UI
#
# Install:
#   sudo apt-get install -y nginx
#   sudo cp nginx-led-signage.conf /etc/nginx/sites-available/led-signage
#   sudo ln -sf /etc/nginx/sites-available/led-signage /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 512M;

    # Proxy all requests to Flask
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Large uploads (video files)
        proxy_request_buffering off;
    }

    # Custom nginx-level error pages (before Flask even sees the request)
    error_page 502 503 504 /nginx_error.html;
    location = /nginx_error.html {
        root /root/led-signage/signage/web/static;
        internal;
    }

    # Serve static files directly via nginx (faster than Flask)
    location /static/ {
        alias /root/led-signage/signage/web/static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
